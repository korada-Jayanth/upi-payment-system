server:
  port: 8080

spring:
  application:
    name: api-gateway

  data:
    redis:
      host: localhost
      port: 6379
      password: redis_pass

  cloud:
    gateway:
      server:
        webflux:
          routes:
            # User Service ? auth endpoints (no JWT needed)
            - id: user-service-auth
              uri: http://localhost:8081
              predicates:
                - Path=/api/auth/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 5
                    redis-rate-limiter.burstCapacity: 10
                    key-resolver: "#{@ipKeyResolver}"

            # User Service ? protected endpoints
            - id: user-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/users/**
              filters:
                - JwtAuth

            # Account Service
            - id: account-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/accounts/**
              filters:
                - JwtAuth

            # UPI Service
            - id: upi-service
              uri: http://localhost:8083
              predicates:
                - Path=/api/upi/**
              filters:
                - JwtAuth

            # Transaction Service
            - id: transaction-service
              uri: http://localhost:8084
              predicates:
                - Path=/api/transactions/**
              filters:
                - JwtAuth

            # Notification Service
            - id: notification-service
              uri: http://localhost:8085
              predicates:
                - Path=/api/notifications/**
              filters:
                - JwtAuth

            # Fraud Detection Service
            - id: fraud-detection-service
              uri: http://localhost:8086
              predicates:
                - Path=/api/fraud/**
              filters:
                - JwtAuth

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

jwt:
  secret: upi-super-secret-key-change-in-production-min-256-bits

management:
  endpoints:
    web:
      exposure:
        include: health,info